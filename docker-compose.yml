version: "3.9"

services:

  # ── PostgreSQL — tenant & document metadata ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartrag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartrag}
      POSTGRES_DB: ${POSTGRES_DB:-smartrag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB — vector store ─────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: smartrag_chroma
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "false"
      ALLOW_RESET: "true"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartrag_backend
    restart: unless-stopped
    env_file: .env
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000          # internal port (8000 inside the chroma container)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartrag}:${POSTGRES_PASSWORD:-smartrag}@postgres:5432/${POSTGRES_DB:-smartrag}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./backend:/app              # hot-reload in dev (remove in prod)
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartrag_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Optional: Prometheus metrics scraper ───────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:v2.52.0
  #   volumes:
  #     - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml
  #   ports:
  #     - "9090:9090"

volumes:
  postgres_data:
  chroma_data:
